/* ============================================================
   HELPERS: período do dashboard — converte entre o estado da UI
   (preset / dia único / intervalo) e o range {since, until} usado
   nas queries do Firestore.
   ============================================================ */
function dateToInputValue(d) {
  // Formata uma Date no fuso local como "YYYY-MM-DD" (valor esperado por <input type="date">)
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return yyyy + "-" + mm + "-" + dd;
}

function inputValueToStartOfDay(value) {
  // "YYYY-MM-DD" -> timestamp do início (00:00:00) daquele dia, no fuso local
  const [y, m, d] = value.split("-").map(Number);
  return new Date(y, m - 1, d, 0, 0, 0, 0).getTime();
}

function inputValueToEndOfDay(value) {
  const [y, m, d] = value.split("-").map(Number);
  return new Date(y, m - 1, d, 23, 59, 59, 999).getTime();
}

function todayInputValue() {
  return dateToInputValue(new Date());
}

// Constrói o range {since, until, label} a partir do estado de período da UI.
function buildPeriodRange(period) {
  if (period.mode === "single") {
    const day = period.singleDate || todayInputValue();
    return {
      since: inputValueToStartOfDay(day),
      until: inputValueToEndOfDay(day),
      label: formatDate(inputValueToStartOfDay(day)),
    };
  }
  if (period.mode === "range") {
    const start = period.startDate || todayInputValue();
    const end = period.endDate || start;
    // Garante ordem correta mesmo se o usuário escolher datas fora de ordem.
    const since = inputValueToStartOfDay(start <= end ? start : end);
    const until = inputValueToEndOfDay(start <= end ? end : start);
    return { since, until, label: formatDate(since) + " a " + formatDate(until) };
  }
  // preset (modo padrão): últimos N dias até agora
  const days = period.days || 7;
  return {
    since: Date.now() - days * 86400000,
    until: null,
    label: days === 1 ? "Hoje" : "Últimos " + days + " dias",
  };
}

/* ============================================================
   HOOK: useToasts
   ============================================================ */
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = "info") => {
    const id = uid();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4200);
  }, []);
  const dismiss = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
  return { toasts, push, dismiss };
}

function ToastStack({ toasts, dismiss }) {
  return (
    <div className="fixed top-4 right-4 left-4 sm:left-auto z-[200] flex flex-col gap-2 items-end pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} onClick={() => dismiss(t.id)}
          className={
            "pointer-events-auto anim-pop max-w-sm w-full sm:w-80 rounded-xl px-4 py-3 shadow-2xl border font-body text-sm cursor-pointer " +
            (t.type === "error" ? "bg-red-950 border-red-600 text-red-100" :
             t.type === "success" ? "bg-emerald-950 border-emerald-600 text-emerald-100" :
             "bg-neutral-900 border-neutral-700 text-neutral-100")
          }>
          <div className="flex items-start gap-2">
            {t.type === "error" && <Icon.Alert className="w-5 h-5 mt-0.5 flex-shrink-0" />}
            {t.type === "success" && <Icon.Check className="w-5 h-5 mt-0.5 flex-shrink-0" />}
            <span>{t.msg}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   HOOK: useVendas — histórico de vendas filtrado por período
   ============================================================ */
function useVendas(range) {
  const [vendas, setVendas] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    if (!db) return;
    setLoading(true);
    try {
      let q = db.collection(HISTORY_COL).where("fechadoEm", ">=", range.since);
      if (range.until) q = q.where("fechadoEm", "<=", range.until);
      const snap = await q.orderBy("fechadoEm", "desc").get();
      const list = [];
      snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
      setVendas(list);
    } catch (e) {
      console.error("Erro ao buscar vendas:", e);
    } finally {
      setLoading(false);
    }
  }, [range.since, range.until]);

  useEffect(() => { load(); }, [load]);

  return { vendas, loading, reload: load };
}

/* ============================================================
   HOOK: useAvaliacoes — NPS/CSAT
   ============================================================ */
function useAvaliacoes(range) {
  const [avaliacoes, setAvaliacoes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!db) return;
    setLoading(true);
    let q = db.collection(AVALIACOES_COL).where("criadoEm", ">=", range.since);
    if (range.until) q = q.where("criadoEm", "<=", range.until);
    q.orderBy("criadoEm", "desc").get()
      .then(snap => {
        const list = [];
        snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
        setAvaliacoes(list);
      })
      .catch(e => console.error("Erro ao buscar avaliações:", e))
      .finally(() => setLoading(false));
  }, [range.since, range.until]);

  return { avaliacoes, loading };
}

/* ============================================================
   HOOK: useClientes — CRM / LTV
   ============================================================ */
function useClientes() {
  const [clientes, setClientes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!db) return;
    db.collection(CLIENTES_COL).get()
      .then(snap => {
        const list = [];
        snap.forEach(doc => list.push({ telefone: doc.id, ...doc.data() }));
        list.sort((a,b) => (b.totalGasto||0) - (a.totalGasto||0));
        setClientes(list);
      })
      .catch(e => console.error("Erro ao buscar clientes:", e))
      .finally(() => setLoading(false));
  }, []);

  return { clientes, loading };
}

/* ============================================================
   HOOK: useCardapio — CRUD do cardápio
   ============================================================ */
function useCardapio() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!db) { setLoading(false); return; }
    const unsub = db.collection(MENU_COL).onSnapshot(
      (snap) => {
        const list = [];
        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
        list.sort((a,b) => CATEGORY_ORDER.indexOf(a.categoria) - CATEGORY_ORDER.indexOf(b.categoria) || (a.ordem||0)-(b.ordem||0));
        setItems(list);
        setLoading(false);
      },
      (err) => { console.error(err); setLoading(false); }
    );
    return () => unsub();
  }, []);

  const addItem = useCallback(async (item) => {
    await db.collection(MENU_COL).add(item);
  }, []);
  const updateItem = useCallback(async (id, patch) => {
    await db.collection(MENU_COL).doc(id).update(patch);
  }, []);
  const deleteItem = useCallback(async (id) => {
    await db.collection(MENU_COL).doc(id).delete();
  }, []);

  return { items, loading, addItem, updateItem, deleteItem };
}

/* ============================================================
   HELPERS: cálculo de NPS e classificação de zona (conforme apostila)
   ============================================================ */
function calcNPS(avaliacoes) {
  const withNps = avaliacoes.filter(a => a.nps !== null && a.nps !== undefined);
  if (withNps.length === 0) return { score: null, promotores: 0, neutros: 0, detratores: 0, total: 0 };
  const promotores = withNps.filter(a => a.nps >= 9).length;
  const neutros = withNps.filter(a => a.nps >= 7 && a.nps <= 8).length;
  const detratores = withNps.filter(a => a.nps <= 6).length;
  const total = withNps.length;
  const score = Math.round(((promotores - detratores) / total) * 100);
  return { score, promotores, neutros, detratores, total };
}

function npsZone(score) {
  if (score === null) return { label: "Sem dados ainda", color: "var(--cream-dim)" };
  if (score < 0) return { label: "Zona crítica", color: "var(--red)" };
  if (score < 50) return { label: "Zona de melhoria", color: "var(--orange)" };
  if (score < 75) return { label: "Zona de qualidade", color: "#60a5fa" };
  return { label: "Zona de excelência", color: "var(--green)" };
}

function calcCSAT(avaliacoes) {
  const withCsat = avaliacoes.filter(a => a.csat !== null && a.csat !== undefined);
  if (withCsat.length === 0) return null;
  const sum = withCsat.reduce((s, a) => s + a.csat, 0);
  return (sum / withCsat.length);
}

  // e estima frequência com base em totalVisitas / dias desde a primeira visita.
  const withLTV = clientes.map(c => {
    const diasAtivos = Math.max(1, daysSince(c.primeiraVisita));
    const frequenciaMensal = (c.totalVisitas || 0) / (diasAtivos / 30);
    const diasSemVoltar = daysSince(c.ultimaVisita);
    const risco = diasSemVoltar > 30 && c.totalVisitas >= 2; // já foi fiel, mas sumiu
    return { ...c, frequenciaMensal, diasSemVoltar, risco };

          <>
            <div className="flex h-3 rounded-full overflow-hidden mb-2">
              <div style={{width: (nps.promotores/nps.total*100)+"%", background:"var(--green)"}}></div>
              <div style={{width: (nps.neutros/nps.total*100)+"%", background:"var(--orange)"}}></div>
              <div style={{width: (nps.detratores/nps.total*100)+"%", background:"var(--red)"}}></div>
            </div>
            <div className="flex justify-between text-[11px] text-[var(--cream-dim)]">
              <span>{nps.promotores} promotores</span>
              <span>{nps.neutros} neutros</span>
              <span>{nps.detratores} detratores</span>
            </div>
          </>
        ) : (
          <p className="text-sm text-[var(--cream-dim)]">Ainda sem avaliações neste período.</p>
        )}
      </div>

      {csat !== null && (
        <div className="leather-tag rounded-2xl p-5">
          <div className="flex items-center justify-between">
            <h3 className="font-display text-lg" style={{color:"var(--cream)"}}>CSAT — Atendimento</h3>
            <div className="flex items-center gap-1">
              <span className="font-display text-2xl" style={{color:"var(--orange)"}}>{csat.toFixed(1)}</span>
              <Icon.Star className="w-5 h-5" style={{color:"var(--orange)"}} />
            </div>
          </div>
          <p className="text-xs text-[var(--cream-dim)] mt-1">Média de satisfação com o atendimento (1 a 5 estrelas)</p>
        </div>
      )}

      {detratoresComComentario.length > 0 && (
        <div className="leather-tag rounded-2xl p-5 border-red-700">
          <div className="flex items-center gap-2 mb-3">
            <Icon.Alert className="w-5 h-5" style={{color:"var(--red)"}} />
            <h3 className="font-display text-lg" style={{color:"var(--cream)"}}>Close the Loop — atenção aqui</h3>
          </div>
          <p className="text-xs text-[var(--cream-dim)] mb-3">Clientes insatisfeitos (nota 0-6) que deixaram comentário. Vale considerar um contato de recuperação.</p>
          <div className="flex flex-col gap-2">
            {detratoresComComentario.map(a => (
              <div key={a.docId} className="px-3 py-2 rounded-lg" style={{background:"rgba(211,47,47,0.1)"}}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-sm font-semibold" style={{color:"var(--cream)"}}>{a.nome}</span>
                  <span className="text-xs font-bold" style={{color:"var(--red)"}}>NPS {a.nps}</span>
                </div>
                <p className="text-xs text-[var(--cream-dim)]">{a.comentario}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {comentarios.length > 0 && (
        <div className="leather-tag rounded-2xl p-5">
          <h3 className="font-display text-lg mb-3" style={{color:"var(--cream)"}}>Todos os comentários</h3>
          <div className="flex flex-col gap-2">
            {comentarios.map(a => (
              <div key={a.docId} className="px-3 py-2 rounded-lg bg-[#1a1714]">
                <div className="flex justify-between items-center mb-1">
                  <span className="text-sm font-semibold" style={{color:"var(--cream)"}}>{a.nome}</span>
                  <span className="text-xs text-[var(--cream-dim)]">{formatDate(a.criadoEm)}</span>
                </div>
                <p className="text-xs text-[var(--cream-dim)]">{a.comentario}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   MODAL: Criar/editar item do cardápio
   ============================================================ */
function ItemFormModal({ item, onClose, onSave, pushToast }) {
  const isEdit = !!item;
  const [nome, setNome] = useState(item ? item.nome : "");
  const [preco, setPreco] = useState(item ? String(item.preco) : "");
  const [desc, setDesc] = useState(item ? item.desc || "" : "");
  const [categoria, setCategoria] = useState(item ? item.categoria : CATEGORY_ORDER[0]);
  const [ehAdicional, setEhAdicional] = useState(item ? !!item.ehAdicional : categoria === "Adicionais");
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    const precoNum = parseFloat(preco.replace(",", "."));
    if (!nome.trim() || isNaN(precoNum)) {
      pushToast("Preencha nome e preço corretamente.", "error");
      return;
    }
    setSaving(true);
    try {
      await onSave({
        nome: nome.trim(), preco: precoNum, desc: desc.trim(), categoria,
        ehAdicional: categoria === "Adicionais" ? true : ehAdicional,
        ativo: item ? item.ativo : true,
        ordem: item ? item.ordem : 99,
      });
      onClose();
    } catch (e) {
      pushToast("Erro ao salvar item.", "error");
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="fixed inset-0 z-[150] flex items-end sm:items-center justify-center bg-black/70 px-0 sm:px-4" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="anim-sheet sm:anim-pop w-full sm:max-w-md leather-tag rounded-t-2xl sm:rounded-2xl p-5 max-h-[88vh] overflow-y-auto">
        <div className="flex justify-between items-center mb-4">
          <h3 className="font-display text-xl" style={{color:"var(--cream)"}}>{isEdit ? "Editar item" : "Novo item"}</h3>
          <button onClick={onClose} className="text-[var(--cream-dim)] focus-ring rounded"><Icon.X className="w-5 h-5"/></button>
        </div>

        <div className="flex flex-col gap-3">
          <div>
            <label className="text-xs text-[var(--cream-dim)] mb-1 block">Nome</label>
            <input value={nome} onChange={e => setNome(e.target.value)} placeholder="Ex: Arretado"
              className="w-full rounded-xl px-3 py-2.5 bg-[#1a1714] border border-[#3d2d1d] text-[var(--cream)] text-sm focus-ring outline-none focus:border-[var(--green)]" />
          </div>
          <div>
            <label className="text-xs text-[var(--cream-dim)] mb-1 block">Preço (R$)</label>
            <input value={preco} onChange={e => setPreco(e.target.value)} placeholder="Ex: 20"
              className="w-full rounded-xl px-3 py-2.5 bg-[#1a1714] border border-[#3d2d1d] text-[var(--cream)] text-sm focus-ring outline-none focus:border-[var(--green)]" />
          </div>
          <div>
            <label className="text-xs text-[var(--cream-dim)] mb-1 block">Descrição</label>
            <textarea value={desc} onChange={e => setDesc(e.target.value)} rows={2} placeholder="Ingredientes..."
              className="w-full rounded-xl px-3 py-2.5 bg-[#1a1714] border border-[#3d2d1d] text-[var(--cream)] text-sm focus-ring outline-none focus:border-[var(--green)] resize-none" />
          </div>
          <div>
            <label className="text-xs text-[var(--cream-dim)] mb-1 block">Categoria</label>
            <div className="flex gap-2 flex-wrap">
              {CATEGORY_ORDER.map(cat => (
                <button key={cat} onClick={() => setCategoria(cat)}
                  className={"tap-active transition-fast px-3 py-1.5 rounded-full text-xs font-semibold border " + (categoria===cat ? "border-transparent" : "border-[#3d2d1d] text-[var(--cream-dim)]")}
                  style={categoria===cat ? { background:"var(--green)", color:"#0a0a0a" } : {}}>
                  {cat}
                </button>
              ))}
            </div>
          </div>
          {categoria !== "Adicionais" && (
            <label className="flex items-center gap-2 text-sm cursor-pointer" style={{color:"var(--cream-dim)"}}>
              <input type="checkbox" checked={ehAdicional} onChange={e => setEhAdicional(e.target.checked)} className="w-4 h-4" />
              Também aparece como adicional no modal de lanches
            </label>
          )}
        </div>

        <button onClick={submit} disabled={saving}
          className="tap-active transition-fast w-full rounded-xl py-3 font-display mt-5 disabled:opacity-50" style={{background:"var(--green)", color:"#0a0a0a"}}>
          {saving ? "Salvando..." : (isEdit ? "Salvar alterações" : "Adicionar ao cardápio")}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   TELA: Cardápio — CRUD
   ============================================================ */
function CardapioScreen({ pushToast }) {
  const { items, loading, addItem, updateItem, deleteItem } = useCardapio();
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [importing, setImporting] = useState(false);

  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.categoria]) grouped[item.categoria] = [];
    grouped[item.categoria].push(item);
  });

  const importDefault = async () => {
    setImporting(true);
    try {
      const batch = db.batch();
      DEFAULT_MENU_SEED.forEach(item => {
        const ref = db.collection(MENU_COL).doc();
        batch.set(ref, item);
      });
      await batch.commit();
      pushToast("Cardápio padrão importado!", "success");
    } catch (e) {
      pushToast("Erro ao importar cardápio.", "error");
    } finally {
      setImporting(false);
    }
  };

  const toggleAtivo = async (item) => {
    try { await updateItem(item.id, { ativo: !item.ativo }); }
    catch (e) { pushToast("Erro ao atualizar item.", "error"); }
  };

  const handleSave = async (data) => {
    if (editing) await updateItem(editing.id, data);
    else await addItem(data);
    pushToast(editing ? "Item atualizado!" : "Item adicionado ao cardápio!", "success");
  };

  const handleDelete = async () => {
    try {
      await deleteItem(confirmDelete.id);
      pushToast("Item removido do cardápio.", "success");
      setConfirmDelete(null);
    } catch (e) {
      pushToast("Erro ao remover item.", "error");
    }
  };

  if (loading) {
    return <p className="text-sm text-[var(--cream-dim)] text-center py-10">Carregando cardápio...</p>;
  }

  return (
    <div className="flex flex-col gap-5">
      {items.length === 0 && (
        <div className="leather-tag rounded-2xl p-6 text-center flex flex-col items-center gap-3">
          <CactusMascot className="w-16 h-16" wobble={false} />
          <p className="text-sm text-[var(--cream-dim)]">O cardápio está vazio no banco de dados.</p>
          <button onClick={importDefault} disabled={importing}
            className="tap-active transition-fast px-5 py-2.5 rounded-xl font-display disabled:opacity-50" style={{background:"var(--green)", color:"#0a0a0a"}}>
            {importing ? "Importando..." : "Importar cardápio padrão do Trilhas do Sertão"}
          </button>
        </div>
      )}

      {items.length > 0 && (
        <button onClick={() => setCreating(true)} className="tap-active transition-fast w-full rounded-xl py-3 font-display border-2 border-dashed border-[#3d2d1d] text-[var(--cream-dim)] flex items-center justify-center gap-2">
          <Icon.Plus className="w-4 h-4" /> Adicionar novo item
        </button>
      )}

      {CATEGORY_ORDER.filter(cat => grouped[cat]).map(cat => (
        <div key={cat}>
          <h3 className="font-display text-base mb-2" style={{color:"var(--orange)"}}>{cat}</h3>
          <div className="flex flex-col gap-2">
            {grouped[cat].map(item => (
              <div key={item.id} className={"leather-tag rounded-xl p-3 flex items-center gap-3 " + (item.ativo === false ? "opacity-50" : "")}>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="font-semibold text-sm" style={{color:"var(--cream)"}}>{item.nome}</span>
                    {item.ativo === false && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-neutral-800 text-neutral-400">oculto</span>}
                  </div>
                  <span className="text-xs" style={{color:"var(--green)"}}>{fmtMoney(item.preco)}</span>
                </div>
                <button onClick={() => toggleAtivo(item)} className="tap-active transition-fast p-2 rounded-lg" title={item.ativo === false ? "Mostrar no cardápio" : "Ocultar do cardápio"}>
                  <Icon.EyeOff className="w-4 h-4" style={{color: item.ativo === false ? "var(--cream-dim)" : "var(--orange)"}} />
                </button>
                <button onClick={() => setEditing(item)} className="tap-active transition-fast p-2 rounded-lg">
                  <Icon.Edit className="w-4 h-4" style={{color:"var(--cream-dim)"}} />
                </button>
                <button onClick={() => setConfirmDelete(item)} className="tap-active transition-fast p-2 rounded-lg">
                  <Icon.Trash className="w-4 h-4 text-red-500" />
                </button>
              </div>
            ))}
          </div>
        </div>
      ))}

      {(creating || editing) && (
        <ItemFormModal item={editing} onClose={() => { setCreating(false); setEditing(null); }} onSave={handleSave} pushToast={pushToast} />
      )}

      {confirmDelete && (
        <div className="fixed inset-0 z-[150] flex items-end sm:items-center justify-center bg-black/70 px-4" onClick={() => setConfirmDelete(null)}>
          <div onClick={e => e.stopPropagation()} className="anim-sheet sm:anim-pop w-full sm:max-w-sm leather-tag rounded-2xl p-5">
            <h3 className="font-display text-lg mb-1" style={{color:"var(--cream)"}}>Remover "{confirmDelete.nome}"?</h3>
            <p className="text-sm text-[var(--cream-dim)] mb-4">O item some do cardápio para sempre. Se for sazonal, prefira "ocultar".</p>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(null)} className="tap-active transition-fast flex-1 rounded-xl py-2.5 font-semibold border border-[#3d2d1d] text-[var(--cream-dim)]">Cancelar</button>
              <button onClick={handleDelete} className="tap-active transition-fast flex-1 rounded-xl py-2.5 font-semibold" style={{background:"var(--red)", color:"#fff"}}>Remover</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP RAIZ — navegação por abas
   ============================================================ */
function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState("dashboard"); // dashboard | clientes | cardapio
  const [period, setPeriod] = useState({ mode: "preset", days: 7 });
  const { toasts, push, dismiss } = useToasts();

  if (!authed) {
    return <PasswordGate onSuccess={() => setAuthed(true)} />;
  }

  return (
    <div className="min-h-screen pb-10" style={{background:"var(--bg)"}}>
      <ToastStack toasts={toasts} dismiss={dismiss} />

      <header className="px-4 pt-5 pb-4 flex flex-col items-center gap-1 sticky top-0 z-30" style={{background:"linear-gradient(180deg, var(--bg) 85%, transparent)"}}>
        <LogoMark size="text-2xl" />
        <span className="text-xs text-[var(--cream-dim)] -mt-1">Painel Gerencial</span>
      </header>

      <div className="px-4 flex gap-2 mb-5 overflow-x-auto scrollbar-none justify-center">
        {[
          { key: "dashboard", label: "Vendas & Satisfação", icon: Icon.ChartBar },
          { key: "clientes", label: "Clientes", icon: Icon.Users },
          { key: "cardapio", label: "Cardápio", icon: Icon.Menu },
        ].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={"tap-active transition-fast px-4 py-2 rounded-full text-sm font-semibold border whitespace-nowrap focus-ring flex items-center gap-1.5 " + (tab===t.key ? "border-transparent" : "border-[#3d2d1d] text-[var(--cream-dim)]")}
            style={tab===t.key ? { background:"var(--green)", color:"#0a0a0a" } : {}}>
            <t.icon className="w-4 h-4" />
            {t.label}
          </button>
        ))}
      </div>

      <main className="px-4 max-w-3xl mx-auto">
        {tab === "dashboard" && <DashboardScreen period={period} setPeriod={setPeriod} />}
        {tab === "clientes" && <ClientesScreen />}
        {tab === "cardapio" && <CardapioScreen pushToast={push} />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
