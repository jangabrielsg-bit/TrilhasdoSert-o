/* ============================================================
   HOOK: useOrders — pedidos ativos + ações de status/exclusão/arquivo
   ============================================================ */
function useOrders() {
  const [orders, setOrders] = useState([]);
  const [connected, setConnected] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!db) { setError("Firebase não configurado."); return; }
    const unsub = db.collection(ORDERS_COL)
      .orderBy("criadoEm", "desc")
      .onSnapshot(
        (snap) => {
          setConnected(true);
          setError(null);
          const list = [];
          snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
          setOrders(list);
        },
        (err) => {
          console.error("Firestore erro:", err);
          setConnected(false);
          setError(err.code || "erro-desconhecido");
        }
      );
    return () => unsub();
  }, []);

  const updateOrder = useCallback(async (docId, patch) => {
    if (!db) throw new Error("sem-firebase");
    await db.collection(ORDERS_COL).doc(docId).update(patch);
  }, []);

  const deleteOrder = useCallback(async (docId) => {
    if (!db) throw new Error("sem-firebase");
    await db.collection(ORDERS_COL).doc(docId).delete();
  }, []);

  // Move pedidos para o histórico de vendas e remove da coleção ativa.
  const archiveOrders = useCallback(async (ordersToArchive) => {
    if (!db) throw new Error("sem-firebase");
    const batch = db.batch();
    ordersToArchive.forEach(o => {
      const { docId, ...data } = o;
      const histRef = db.collection(HISTORY_COL).doc(docId);
      batch.set(histRef, { ...data, status: STATUS.FECHADO, contaPedida: false, fechadoEm: Date.now() });
      const activeRef = db.collection(ORDERS_COL).doc(docId);
      batch.delete(activeRef);
    });
    await batch.commit();
  }, []);

  return { orders, connected, error, updateOrder, deleteOrder, archiveOrders };
}

/* Histórico de vendas — lido sob demanda quando o garçom abre a aba */
function useHistory(enabled) {
  const [history, setHistory] = useState([]);
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    if (!db) return;
    setLoading(true);
    try {
      const startOfDay = new Date();
      startOfDay.setHours(0,0,0,0);
      const snap = await db.collection(HISTORY_COL)
        .where("fechadoEm", ">=", startOfDay.getTime())
        .orderBy("fechadoEm", "desc")
        .get();
      const list = [];
      snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
      setHistory(list);
    } catch (e) {
      console.error("Erro ao buscar histórico:", e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { if (enabled) load(); }, [enabled, load]);

  return { history, loading, reload: load };
}

/* Busca dados de CRM do cliente (telefone) para o garçom ver histórico */
function useClienteInfo(telefone) {
  const [cliente, setCliente] = useState(null);
  useEffect(() => {
    if (!db || !telefone) { setCliente(null); return; }
    db.collection(CLIENTES_COL).doc(telefone).get().then(doc => {
      setCliente(doc.exists ? doc.data() : null);
    }).catch(() => setCliente(null));
  }, [telefone]);
  return cliente;
}

/* Beep simples via WebAudio para notificar novo pedido */
function playBeep(times = 1) {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    for (let i = 0; i < times; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.connect(gain); gain.connect(ctx.destination);
      const start = ctx.currentTime + i * 0.25;
      osc.start(start);
      gain.gain.setValueAtTime(0.15, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.18);
      osc.stop(start + 0.2);
    }
  } catch (e) { /* silencioso se navegador bloquear áudio */ }
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = "info") => {
    const id = uid();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4200);
  }, []);
  const dismiss = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
  return { toasts, push, dismiss };
}

            <span>{t.msg}</span>

      ))}

}

/* ============================================================
   COMPONENTE: Card de pedido — destaca cliente recorrente e VIP
   ============================================================ */
function OrderCard({ order, now, lateMinutes = 12, children }) {
  const mins = Math.floor((now - order.criadoEm) / 60000);
  const late = order.status !== STATUS.PRONTO && order.status !== STATUS.ENTREGUE && order.status !== STATUS.FECHADO && mins >= lateMinutes;
  const cliente = useClienteInfo(order.telefone);
  const recorrente = cliente && cliente.totalVisitas >= 2;

  return (
    <div className={"leather-tag rounded-2xl p-4 anim-rise " + (late ? "pulse-late border-red-700" : "")}>
      <div className="flex justify-between items-start mb-2">
        <div>
          <div className="font-display text-lg flex items-center gap-1.5" style={{color:"var(--cream)"}}>
            {order.nome} <span className="text-[var(--cream-dim)]" style={{fontSize:"0.65em"}}>#{order.codigo}</span>
            {recorrente && <Icon.Heart className="w-3.5 h-3.5" style={{color:"var(--red)"}} title="Cliente recorrente" />}
          </div>
          <div className="text-[11px] text-[var(--cream-dim)]">{formatClock(order.criadoEm)}</div>
          {recorrente && (
            <div className="text-[11px] mt-0.5" style={{color:"var(--orange)"}}>
              {cliente.totalVisitas}ª visita · já gastou {fmtMoney(cliente.totalGasto || 0)}
            </div>
          )}
        </div>
        <div className={"flex items-center gap-1 text-xs font-bold px-2 py-1 rounded-full " + (late ? "bg-red-900 text-red-200" : "bg-[#2a1f16] text-[var(--cream-dim)]")}>
          <Icon.Clock className="w-3 h-3" />
          {mins} min
        </div>
      </div>
      <div className="flex flex-col gap-2 mb-3">
        {order.itens.map((it, idx) => (
          <div key={idx} className="text-sm" style={{color:"var(--cream)"}}>
            <div>{it.qtd}x {it.nome}</div>
            {(it.adicionais && it.adicionais.length > 0) && (
              <div className="flex flex-wrap gap-1 mt-1">
                {it.adicionais.map(a => (
                  <span key={a.id} className="text-[10px] font-semibold px-1.5 py-0.5 rounded-full" style={{background:"rgba(74,222,128,0.15)", color:"var(--green)"}}>+ {a.nome}</span>
                ))}
              </div>
            )}
            {it.obs && (
              <div className="text-xs font-bold mt-1 px-2 py-1 rounded-lg flex items-start gap-1.5" style={{background:"rgba(211,47,47,0.18)", color:"#ff8a8a"}}>
                <Icon.Alert className="w-3.5 h-3.5 flex-shrink-0 mt-0.5" />
                <span>{it.obs}</span>
              </div>
            )}
          </div>
        ))}
      </div>
      {order.contaPedida && order.status !== STATUS.FECHADO && (
        <div className="flex items-center gap-1.5 text-xs font-bold mb-2 px-2 py-1 rounded-lg w-fit" style={{background:"rgba(255,167,38,0.15)", color:"var(--orange)"}}>
          <Icon.Receipt className="w-3.5 h-3.5" /> Conta pedida
        </div>
      )}
      {children}
    </div>
  );
}

/* ============================================================
   MODAL: Conta do cliente — soma todos os pedidos da comanda
   ============================================================ */
function BillModal({ comandaId, orders, onClose, onCloseBill, closing }) {
  const total = orders.reduce((sum, o) => sum + o.itens.reduce((s,i)=>s+cartItemTotal(i),0), 0);
  const primeiro = orders[0];
  const cliente = useClienteInfo(primeiro ? primeiro.telefone : null);

  return (
    <div className="fixed inset-0 z-[150] flex items-end sm:items-center justify-center bg-black/70 px-4" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="anim-sheet sm:anim-pop w-full sm:max-w-sm leather-tag rounded-2xl p-5 max-h-[80vh] overflow-y-auto">
        <div className="flex justify-between items-center mb-3">
          <h3 className="font-display text-xl" style={{color:"var(--cream)"}}>Conta — {primeiro ? primeiro.nome : ""} <span className="text-sm text-[var(--cream-dim)]">#{primeiro ? primeiro.codigo : ""}</span></h3>
          <button onClick={onClose} className="text-[var(--cream-dim)] focus-ring rounded"><Icon.X className="w-5 h-5"/></button>
        </div>

        {cliente && cliente.totalVisitas >= 2 && (
          <div className="flex items-center gap-2 mb-3 px-3 py-2 rounded-lg" style={{background:"rgba(211,47,47,0.1)"}}>
            <Icon.Heart className="w-4 h-4 flex-shrink-0" style={{color:"var(--red)"}} />
            <span className="text-xs" style={{color:"var(--cream-dim)"}}>
              Cliente recorrente — {cliente.totalVisitas}ª visita, total histórico {fmtMoney(cliente.totalGasto || 0)}
            </span>
          </div>
        )}

        <div className="flex flex-col gap-3 mb-4">
          {orders.map(order => (
            <div key={order.docId} className="border-b border-[#3d2d1d] pb-2">
              <div className="text-[11px] text-[var(--cream-dim)] mb-1">{formatClock(order.criadoEm)}</div>
              {order.itens.map((it, idx) => (
                <div key={idx} className="text-sm mb-1.5" style={{color:"var(--cream)"}}>
                  <div className="flex justify-between">
                    <span>{it.qtd}x {it.nome}</span>
                    <span className="text-[var(--cream-dim)]">{fmtMoney(cartItemTotal(it))}</span>
                  </div>
                  {(it.adicionais && it.adicionais.length > 0) && (
                    <div className="text-[11px] text-[var(--orange)] mt-0.5">
                      {it.adicionais.map(a => "+ " + a.nome).join(", ")}
                    </div>
                  )}
                  {it.obs && (
                    <div className="text-[11px] italic text-[var(--cream-dim)] mt-0.5">{it.obs}</div>
                  )}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="flex justify-between items-center mb-4">
          <span className="font-display text-lg" style={{color:"var(--cream)"}}>Total</span>
          <span className="font-display text-2xl" style={{color:"var(--green)"}}>{fmtMoney(total)}</span>
        </div>
        <p className="text-xs text-[var(--cream-dim)] mb-3">Passe esse valor na máquina e depois encerre a conta. Ao encerrar, o pedido sai da tela ativa e vai pro histórico de vendas.</p>
        <button onClick={onCloseBill} disabled={closing} className="tap-active transition-fast w-full rounded-xl py-3 font-display disabled:opacity-50" style={{background:"var(--green)", color:"#0a0a0a"}}>
          {closing ? "Encerrando..." : "Encerrar conta"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   TELA: Garçom — comandas ativas, entrega, contas e gestão
   ============================================================ */
function WaiterScreen({ orders, updateOrder, deleteOrder, archiveOrders, now, pushToast }) {
  const [filter, setFilter] = useState("ativos");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [billView, setBillView] = useState(null);
  const [closing, setClosing] = useState(false);

  const ativos = orders.filter(o => o.status !== STATUS.FECHADO);
  const pedindoConta = orders.filter(o => o.contaPedida && o.status !== STATUS.FECHADO);
  const { history, loading: loadingHistory } = useHistory(filter === "historico");

  const list = filter === "ativos" ? ativos : pedindoConta;

  const setStatus = async (order, status) => {
    try { await updateOrder(order.docId, { status, atualizadoEm: Date.now() }); }
    catch (e) { pushToast("Erro ao atualizar pedido.", "error"); }
  };

  const closeBill = async (comandaId) => {
    const ordersOfClient = orders.filter(o => o.comandaId === comandaId && o.status !== STATUS.FECHADO);
    setClosing(true);
    try {
      await archiveOrders(ordersOfClient);
      pushToast("Conta encerrada e movida pro histórico.", "success");
      setBillView(null);
    } catch (e) {
      pushToast("Erro ao encerrar a conta.", "error");
    } finally {
      setClosing(false);
    }
  };

  const removeOrder = async (order) => {
    try {
      await deleteOrder(order.docId);
      pushToast("Pedido removido.", "success");
      setConfirmDelete(null);
    } catch (e) {
      pushToast("Erro ao excluir pedido.", "error");
    }
  };

  return (
    <div className="min-h-screen pb-6" style={{background:"var(--bg)"}}>
      <header className="px-4 pt-4 pb-3 flex items-center justify-between sticky top-0 z-30" style={{background:"linear-gradient(180deg, var(--bg) 75%, transparent)"}}>
        <div className="flex items-center gap-2">
          <Icon.Bell className="w-5 h-5" style={{color:"var(--orange)"}} />
          <span className="font-display text-lg" style={{color:"var(--cream)"}}>Garçom</span>
        </div>
        <span className="text-xs text-[var(--cream-dim)]">Trilhas do Sertão</span>
      </header>

      <div className="px-4 flex gap-2 mb-4 overflow-x-auto scrollbar-none">
        {[
          { key: "ativos", label: "Ativos (" + ativos.length + ")" },
          { key: "contas", label: "Pedindo conta (" + pedindoConta.length + ")" },
          { key: "historico", label: "Histórico de hoje" },
        ].map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)}
            className={"tap-active transition-fast px-4 py-2 rounded-full text-sm font-semibold border whitespace-nowrap focus-ring " + (filter===f.key ? "border-transparent" : "border-[#3d2d1d] text-[var(--cream-dim)]")}
            style={filter===f.key ? { background: f.key==="contas" ? "var(--orange)" : "var(--green)", color:"#0a0a0a" } : {}}>
            {f.key === "contas" && pedindoConta.length > 0 && <Icon.Alert className="w-3.5 h-3.5 inline mr-1" />}
            {f.label}
          </button>
        ))}
      </div>

      {filter === "historico" ? (
        <main className="px-4 flex flex-col gap-3">
          {loadingHistory && (
            <p className="text-sm text-[var(--cream-dim)] text-center py-10">Carregando histórico...</p>
          )}
          {!loadingHistory && history.length === 0 && (
            <div className="flex flex-col items-center text-center py-16 gap-2">
              <CactusMascot className="w-16 h-16" wobble={false} />
              <p className="text-[var(--cream-dim)] text-sm">Nenhuma conta encerrada hoje ainda.</p>
            </div>
          )}
          {!loadingHistory && history.length > 0 && (
            <>
              <div className="leather-tag rounded-2xl p-4 flex justify-between items-center">
                <span className="text-sm text-[var(--cream-dim)]">Total faturado hoje</span>
                <span className="font-display text-xl" style={{color:"var(--green)"}}>
                  {fmtMoney(history.reduce((s,o) => s + o.itens.reduce((s2,i)=>s2+cartItemTotal(i),0), 0))}
                </span>
              </div>
              {history.map(order => (
                <div key={order.docId} className="leather-tag rounded-2xl p-4">
                  <div className="flex justify-between items-center mb-2">
                    <span className="font-display" style={{color:"var(--cream)"}}>{order.nome} <span className="text-xs text-[var(--cream-dim)]">#{order.codigo}</span></span>
                    <span className="text-xs text-[var(--cream-dim)]">{formatClock(order.fechadoEm)}</span>
                  </div>
                  <div className="flex flex-col gap-1">
                    {order.itens.map((it, idx) => (
                      <div key={idx} className="flex justify-between text-sm" style={{color:"var(--cream-dim)"}}>
                        <span>{it.qtd}x {it.nome}</span>
                        <span>{fmtMoney(cartItemTotal(it))}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </>
          )}
        </main>
      ) : (
        <main className="px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {list.length === 0 && (
            <div className="col-span-full flex flex-col items-center text-center py-16 gap-2">
              <CactusMascot className="w-16 h-16" wobble={false} />
              <p className="text-[var(--cream-dim)] text-sm">Nada por aqui agora.</p>
            </div>
          )}
          {list.map(order => (
            <OrderCard key={order.docId} order={order} now={now}>
              <div className="flex flex-col gap-2">
                <div className="flex gap-2">
                  {order.status === STATUS.RECEBIDO && (
                    <button onClick={() => setStatus(order, STATUS.PREPARO)}
                      className="tap-active transition-fast flex-1 rounded-lg py-2 text-xs font-bold flex items-center justify-center gap-1" style={{background:"var(--red)", color:"#fff"}}>
                      <Icon.Flame className="w-3.5 h-3.5"/> Ir pra brasa
                    </button>
                  )}
                  {order.status === STATUS.PREPARO && (
                    <button onClick={() => setStatus(order, STATUS.PRONTO)}
                      className="tap-active transition-fast flex-1 rounded-lg py-2 text-xs font-bold flex items-center justify-center gap-1" style={{background:"var(--green)", color:"#0a0a0a"}}>
                      <Icon.Check className="w-3.5 h-3.5"/> Marcar pronto
                    </button>
                  )}
                  {order.status === STATUS.PRONTO && (
                    <button onClick={() => setStatus(order, STATUS.ENTREGUE)}
                      className="tap-active transition-fast flex-1 rounded-lg py-2 text-xs font-bold flex items-center justify-center gap-1" style={{background:"var(--green)", color:"#0a0a0a"}}>
                      <Icon.Check className="w-3.5 h-3.5"/> Entregar
                    </button>
                  )}
                  {order.status === STATUS.ENTREGUE && (
                    <span className="flex-1 text-xs text-center py-2 text-[var(--cream-dim)]">Entregue ✓</span>
                  )}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(order)} className="tap-active transition-fast flex-1 rounded-lg py-2 text-xs font-semibold flex items-center justify-center gap-1 border border-[#3d2d1d] text-[var(--cream-dim)]">
                    <Icon.Trash className="w-3.5 h-3.5"/> Excluir
                  </button>
                  <button onClick={() => setBillView(order.comandaId)} className="tap-active transition-fast flex-1 rounded-lg py-2 text-xs font-semibold flex items-center justify-center gap-1 border border-[#3d2d1d]" style={{color:"var(--orange)"}}>
                    <Icon.Receipt className="w-3.5 h-3.5"/> Ver conta
                  </button>
                </div>
              </div>
            </OrderCard>
          ))}
        </main>
      )}

      {confirmDelete && (
        <div className="fixed inset-0 z-[150] flex items-end sm:items-center justify-center bg-black/70 px-4" onClick={() => setConfirmDelete(null)}>
          <div onClick={e => e.stopPropagation()} className="anim-sheet sm:anim-pop w-full sm:max-w-sm leather-tag rounded-2xl p-5">
            <h3 className="font-display text-lg mb-1" style={{color:"var(--cream)"}}>Excluir pedido de {confirmDelete.nome}?</h3>
            <p className="text-sm text-[var(--cream-dim)] mb-4">Essa ação não pode ser desfeita.</p>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(null)} className="tap-active transition-fast flex-1 rounded-xl py-2.5 font-semibold border border-[#3d2d1d] text-[var(--cream-dim)]">Cancelar</button>
              <button onClick={() => removeOrder(confirmDelete)} className="tap-active transition-fast flex-1 rounded-xl py-2.5 font-semibold" style={{background:"var(--red)", color:"#fff"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}

      {billView && (
        <BillModal
          comandaId={billView}
          orders={orders.filter(o => o.comandaId === billView && o.status !== STATUS.FECHADO)}
          onClose={() => setBillView(null)}
          onCloseBill={() => closeBill(billView)}
          closing={closing}
        />
      )}
    </div>
  );
}

/* ============================================================
   APP RAIZ
   ============================================================ */
function App() {
  const [authed, setAuthed] = useState(false);
  const [now, setNow] = useState(Date.now());
  const { orders, connected, error, updateOrder, deleteOrder, archiveOrders } = useOrders();
  const { toasts, push, dismiss } = useToasts();

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 15000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (error) push("Erro de conexão (" + error + "). Verifique as regras do Firestore.", "error");
  }, [error]);

  const knownIds = useRef(new Set());
  useEffect(() => {
    if (!authed) { knownIds.current = new Set(orders.map(o=>o.docId)); return; }
    const currentIds = new Set(orders.map(o => o.docId));
    let isNew = false;
    currentIds.forEach(id => { if (!knownIds.current.has(id)) isNew = true; });
    if (knownIds.current.size > 0 && isNew) {
      playBeep(2);
      push("Novo pedido recebido!", "info");
    }
    knownIds.current = currentIds;
  }, [orders, authed]);

  if (!authed) {
    return <PasswordGate onSuccess={() => setAuthed(true)} />;
  }

  return (
    <>
      <ToastStack toasts={toasts} dismiss={dismiss} />
      {!connected && !error && (
        <div className="fixed bottom-2 left-1/2 -translate-x-1/2 z-[100] text-[10px] text-neutral-500 bg-black/60 px-3 py-1 rounded-full">
          conectando...
        </div>
      )}
      <WaiterScreen orders={orders} updateOrder={updateOrder} deleteOrder={deleteOrder} archiveOrders={archiveOrders} now={now} pushToast={push} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
